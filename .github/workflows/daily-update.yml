name: Daily Card Database Update (Fixed)

# Runs daily at 2 PM PDT (21:00 UTC, adjusts automatically for DST)
# TCGPlayer updates at 1 PM PDT, so we run 1 hour later
on:
  schedule:
    # Single cron schedule - 21:00 UTC = 2 PM PDT / 3 PM PST
    - cron: '0 21 * * *'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      game:
        description: 'Game to update (or "all")'
        required: false
        default: 'one-piece'
      dry_run:
        description: 'Dry run (no commits)'
        required: false
        default: 'false'
      skip_lfs:
        description: 'Skip LFS download (if artifacts not changed)'
        required: false
        default: 'false'

jobs:
  update-database:
    runs-on: ubuntu-latest
    timeout-minutes: 240  # 4 hours max

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: ${{ github.event.inputs.skip_lfs != 'true' }}  # ✅ FIXED: Add LFS support

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Node dependencies
        run: |
          # Clear any cached tsx/tsconfig state
          rm -rf node_modules/.cache 2>/dev/null || true
          rm -rf services/ingest/node_modules/.cache 2>/dev/null || true
          pnpm install --frozen-lockfile

      - name: Build TypeScript packages
        run: |
          echo "Building shared packages..."
          cd packages/config && pnpm build
          cd ../shared && pnpm build
          cd ../..
          echo "✅ Packages built successfully"

      - name: Install Python dependencies
        run: |
          # ✅ OPTIMIZED: Use CI-specific requirements (75% smaller, 3-5x faster)
          pip install -r requirements-ci.txt

          echo "✅ Installed minimal Python dependencies for CI scraper"
          echo "   Excluded: OCR engines, GPU libraries, test dependencies"
          echo "   Savings: ~3-5 GB disk space, 5-10 min install time"

      - name: Configure Git
        run: |
          git config user.name "CardFlux Bot"
          git config user.email "bot@cardflux.com"

      - name: Check system health (pre-update)
        run: |
          echo "=== Pre-Update Health Check ==="
          echo "Node version: $(node --version)"
          echo "Python version: $(python --version)"
          echo "pnpm version: $(pnpm --version)"
          echo "Disk space:"
          df -h
          echo "Memory:"
          free -h

      - name: Create backup of current state
        run: |
          mkdir -p backups/pre-update-$(date +%Y%m%d)

          # Backup FAISS indices (small, always backup)
          if [ -d "artifacts/faiss" ]; then
            cp -r artifacts/faiss backups/pre-update-$(date +%Y%m%d)/ || true
            echo "✅ Backed up FAISS indices"
          fi

          # Backup metadata (small, always backup)
          if [ -d "artifacts/metadata" ]; then
            cp -r artifacts/metadata backups/pre-update-$(date +%Y%m%d)/ || true
            echo "✅ Backed up metadata"
          fi

          echo "Backup created: backups/pre-update-$(date +%Y%m%d)"

      - name: Check if initial data exists
        id: check_data
        run: |
          # Check for both curated data AND FAISS index
          if [ -f "data/curated/one-piece.jsonl" ] && [ -f "artifacts/faiss/one-piece-dinov2/index.faiss" ]; then
            echo "has_data=true" >> $GITHUB_OUTPUT
            echo "✅ Existing data found - will run incremental update"

            # Show stats
            echo "Cards in database: $(wc -l < data/curated/one-piece.jsonl)"
            echo "Index size: $(du -h artifacts/faiss/one-piece-dinov2/index.faiss | cut -f1)"
          else
            echo "has_data=false" >> $GITHUB_OUTPUT
            echo "⚠️  No existing data - will run full scrape"

            if [ ! -f "data/curated/one-piece.jsonl" ]; then
              echo "Missing: data/curated/one-piece.jsonl"
            fi
            if [ ! -f "artifacts/faiss/one-piece-dinov2/index.faiss" ]; then
              echo "Missing: artifacts/faiss/one-piece-dinov2/index.faiss"
            fi
          fi

      - name: Run initial full scrape (first time only)
        if: steps.check_data.outputs.has_data == 'false'
        run: |
          echo "🔄 Running full scrape from TCGPlayer..."
          echo "This is the first run - building database from scratch"
          echo "Estimated time: 30-60 minutes"
          echo ""

          # ✅ FIXED: Use pnpm scripts consistently (no cd commands)

          # Step 1: Scrape TCGPlayer data
          echo "[1/6] Scraping TCGPlayer..."
          pnpm tsx services/ingest/bin/tcgplayer-scraper-onepiece.ts

          # Step 2: Normalize data
          echo "[2/6] Normalizing data..."
          pnpm pipeline:normalize

          # Step 3: Download images
          echo "[3/6] Downloading images..."
          pnpm tsx services/ingest/bin/fetch_images_onepiece.ts

          # Step 4: Build SQLite database
          echo "[4/6] Building metadata database..."
          pnpm pipeline:metadata

          # Step 5: Generate embeddings
          echo "[5/6] Generating embeddings (DINOv2 with preprocessing)..."
          # ✅ FIXED: Use One Piece specific embedder
          python services/embedder/bin/embed_onepiece_dinov2_with_preprocessing.py

          # Step 6: Build FAISS index
          echo "[6/6] Building FAISS index..."
          pnpm pipeline:index

          echo "✅ Initial data created successfully"

      - name: Run incremental update
        id: update
        if: steps.check_data.outputs.has_data == 'true'
        run: |
          echo "Starting CardFlux incremental update..."
          echo "Game: ${{ github.event.inputs.game || 'one-piece' }}"
          echo "Time: $(date)"
          echo "Estimated time: 5-15 minutes"
          echo ""

          # ✅ ULTIMATE FIX: Use tsx (already installed, simpler than ts-node)
          # tsx handles module resolution correctly without needing config overrides

          # ✅ Use the incremental pipeline script
          pnpm pipeline:update

          echo ""
          echo "Update completed successfully"
          echo "update_status=success" >> $GITHUB_OUTPUT
        continue-on-error: false

      - name: Regenerate keypoints cache (if missing)
        if: steps.check_data.outputs.has_data == 'true'
        run: |
          # Check if keypoints exist
          if [ ! -f "artifacts/keypoints/one-piece/orb_keypoints.npz" ]; then
            echo "⚠️  Keypoints cache missing - regenerating..."
            echo "This takes ~45 seconds..."

            python scripts/identification/tools/precompute_geometric_features.py

            echo "✅ Keypoints cache regenerated"
          else
            echo "✅ Keypoints cache exists"
            echo "Size: $(du -h artifacts/keypoints/one-piece/orb_keypoints.npz | cut -f1)"
          fi

      - name: Generate update report
        if: always()
        run: |
          cat > update-report.md << 'EOF'
          # CardFlux Update Report

          **Date:** $(date)
          **Status:** ${{ steps.update.outputs.update_status || 'failed' }}
          **Game:** ${{ github.event.inputs.game || 'one-piece' }}

          ## Changes

          $(git diff --stat || echo "No changes detected")

          ## New Files

          $(git status --short || echo "No new files")

          ## Artifacts Status

          $(ls -lh artifacts/faiss/*/index.faiss 2>/dev/null || echo "No index files found")
          $(ls -lh artifacts/metadata/embeddings/*/metadata.jsonl 2>/dev/null || echo "No metadata files found")
          $(ls -lh artifacts/keypoints/*/orb_keypoints.npz 2>/dev/null || echo "No keypoints files found")

          ## Card Counts

          $(find data/curated -name "*.jsonl" -exec sh -c 'echo "{}: $(wc -l < {})" cards' \; 2>/dev/null || echo "No JSONL files found")

          ## System Info

          - Node: $(node --version)
          - Python: $(python --version)
          - Disk: $(df -h . | tail -1)
          - pnpm: $(pnpm --version)

          EOF

          cat update-report.md

      - name: Check for changes
        id: check_changes
        run: |
          git add -A

          # Show what changed
          echo "=== Git Status ==="
          git status --short

          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo ""
            echo "ℹ️  No changes detected - database is already up to date"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo ""
            echo "✅ Changes detected:"
            git diff --staged --stat
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          # Get stats for commit message
          CARDS_ADDED=$(git diff --cached data/curated/*.jsonl | grep -c "^+" || echo "0")
          FILES_CHANGED=$(git diff --staged --name-only | wc -l)

          # Create detailed commit message
          git commit -m "chore: Automated database update - $(date +%Y-%m-%d)

          Incremental update from TCGPlayer API:
          - Scraped latest card data
          - Downloaded new images ($CARDS_ADDED new cards)
          - Generated embeddings (DINOv2 with preprocessing)
          - Rebuilt FAISS indices
          - Updated metadata and manifests

          Files changed: $FILES_CHANGED

          🤖 Automated update via GitHub Actions
          📅 $(date -u +%Y-%m-%dT%H:%M:%SZ)
          🔗 Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          echo "Pushing changes to main..."
          git push origin main

          echo "✅ Changes committed and pushed"

      - name: Post-update health check
        if: steps.update.outputs.update_status == 'success' || steps.check_data.outputs.has_data == 'false'
        run: |
          echo "=== Post-Update Health Check ==="

          # Check each enabled game
          for game in one-piece; do
            echo ""
            echo "Checking: $game"

            INDEX="artifacts/faiss/${game}-dinov2/index.faiss"
            META="artifacts/metadata/embeddings/${game}-dinov2/metadata.jsonl"
            KEYPOINTS="artifacts/keypoints/${game}/orb_keypoints.npz"
            DATA="data/curated/${game}.jsonl"

            # Check index
            if [ -f "$INDEX" ]; then
              SIZE=$(du -h "$INDEX" | cut -f1)
              echo "  ✅ Index: $SIZE"
            else
              echo "  ❌ Index: MISSING"
            fi

            # Check metadata
            if [ -f "$META" ]; then
              CARDS=$(wc -l < "$META")
              echo "  ✅ Metadata: $CARDS cards"
            else
              echo "  ❌ Metadata: MISSING"
            fi

            # Check keypoints
            if [ -f "$KEYPOINTS" ]; then
              SIZE=$(du -h "$KEYPOINTS" | cut -f1)
              echo "  ✅ Keypoints: $SIZE"
            else
              echo "  ⚠️  Keypoints: MISSING (will regenerate on next run)"
            fi

            # Check curated data
            if [ -f "$DATA" ]; then
              CARDS=$(wc -l < "$DATA")
              echo "  ✅ Curated data: $CARDS cards"
            else
              echo "  ❌ Curated data: MISSING"
            fi
          done

      - name: Upload update artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-report-${{ github.run_number }}
          path: |
            update-report.md
            logs/**/*.log
            data/state/*.json
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Update failed!"
          echo "Check the logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # TODO: Add webhook notifications here (Slack, Discord, etc.)
          # Uncomment and add webhook URL to secrets:
          # curl -X POST "${{ secrets.SLACK_WEBHOOK }}" \
          #   -H 'Content-Type: application/json' \
          #   -d '{"text":"CardFlux update failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'

      - name: Cleanup old backups
        if: always()
        run: |
          # Keep only last 3 backups
          if [ -d "backups" ]; then
            cd backups
            ls -t | tail -n +4 | xargs -r rm -rf || true
            cd ..
            echo "✅ Cleaned up old backups (kept last 3)"
          fi

      - name: Cleanup build artifacts (save space)
        if: always()
        run: |
          # Remove node_modules to save space (will be cached)
          rm -rf node_modules

          # Remove Python cache
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true

          echo "✅ Cleaned up build artifacts"
