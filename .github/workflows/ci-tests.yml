name: CI - Tests and Validation

# Run on all pull requests and pushes to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  desktop-tests:
    name: Desktop App Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type checking
        run: pnpm typecheck

      - name: Run desktop app tests
        run: |
          cd apps/desktop
          pnpm test --ci --coverage --maxWorkers=2

      - name: Upload test coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./apps/desktop/coverage/lcov.info
          flags: desktop
          name: desktop-app-coverage
          fail_ci_if_error: false

      - name: Comment test results on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coveragePath = './apps/desktop/coverage/coverage-summary.json';

            if (!fs.existsSync(coveragePath)) {
              console.log('No coverage file found');
              return;
            }

            const coverage = JSON.parse(fs.readFileSync(coveragePath, 'utf8'));
            const total = coverage.total;

            const comment = `### 🧪 Desktop App Test Results

            | Metric | Coverage | Status |
            |--------|----------|--------|
            | Lines | ${total.lines.pct}% | ${total.lines.pct >= 70 ? '✅' : '❌'} |
            | Statements | ${total.statements.pct}% | ${total.statements.pct >= 70 ? '✅' : '❌'} |
            | Functions | ${total.functions.pct}% | ${total.functions.pct >= 60 ? '✅' : '❌'} |
            | Branches | ${total.branches.pct}% | ${total.branches.pct >= 60 ? '✅' : '❌'} |

            **Target**: Lines ≥70%, Statements ≥70%, Functions ≥60%, Branches ≥60%
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  production-validation:
    name: Production Validation (Fast Identifier v2)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: true

      - name: Pull Git LFS files
        run: |
          echo "Pulling Git LFS files..."
          git lfs pull
          echo "✅ LFS files pulled"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install transformers pillow opencv-python-headless faiss-cpu numpy

      - name: Verify test images exist
        run: |
          echo "Checking test images..."
          ls -lh test-images/one-piece/
          echo "✅ Test images verified"

      - name: Verify FAISS index exists
        run: |
          echo "Checking FAISS artifacts..."
          ls -lh artifacts/faiss/one-piece/
          ls -lh artifacts/metadata/one-piece/
          echo "✅ FAISS artifacts verified"

      - name: Run production validation
        run: |
          python scripts/identification/tests/production_validation.py
        continue-on-error: false

      - name: Check validation results
        run: |
          if [ -f "test-results/current/production_validation.json" ]; then
            echo "✅ Validation results generated"
            cat test-results/current/production_validation.json | python -m json.tool
          else
            echo "❌ Validation results not found"
            exit 1
          fi

      - name: Verify accuracy threshold
        run: |
          python -c "
          import json
          with open('test-results/current/production_validation.json') as f:
              results = json.load(f)
          accuracy = results['metrics']['accuracy']
          high_confidence_accuracy = results['metrics']['accuracy_by_confidence']['HIGH']

          print(f'Overall Accuracy: {accuracy*100:.1f}%')
          print(f'HIGH Confidence Accuracy: {high_confidence_accuracy*100:.1f}%')

          if accuracy < 0.95:
              print(f'❌ FAILED: Accuracy {accuracy*100:.1f}% below 95% threshold')
              exit(1)

          if high_confidence_accuracy < 0.98:
              print(f'❌ FAILED: HIGH confidence accuracy {high_confidence_accuracy*100:.1f}% below 98% threshold')
              exit(1)

          print('✅ PASSED: All accuracy thresholds met')
          "

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-validation-results
          path: test-results/current/production_validation.json
          retention-days: 30

      - name: Comment validation results on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsPath = './test-results/current/production_validation.json';

            if (!fs.existsSync(resultsPath)) {
              console.log('No validation results found');
              return;
            }

            const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
            const metrics = results.metrics;

            const accuracy = (metrics.accuracy * 100).toFixed(1);
            const highAccuracy = (metrics.accuracy_by_confidence.HIGH * 100).toFixed(1);
            const avgTime = metrics.timing.avg_ms.toFixed(1);

            const passIcon = accuracy >= 95 && highAccuracy >= 98 ? '🟢' : '🟡';

            const comment = `### ${passIcon} Production Validation Results

            | Metric | Value | Target | Status |
            |--------|-------|--------|--------|
            | Overall Accuracy | ${accuracy}% | ≥95% | ${accuracy >= 95 ? '✅' : '❌'} |
            | HIGH Confidence Accuracy | ${highAccuracy}% | ≥98% | ${highAccuracy >= 98 ? '✅' : '❌'} |
            | HIGH Confidence Rate | ${metrics.confidence_distribution.HIGH}/${metrics.total_tests} | ≥80% | ${(metrics.confidence_distribution.HIGH / metrics.total_tests * 100) >= 80 ? '✅' : '❌'} |
            | Average Time | ${avgTime}ms | <200ms | ${avgTime < 200 ? '✅' : '⚠️'} |

            **Test Cases**: ${metrics.correct}/${metrics.total_tests} correct

            **Match Types**:
            - Exact: ${metrics.match_type_distribution.exact}
            - Variant: ${metrics.match_type_distribution.variant}
            - Number Only: ${metrics.match_type_distribution.number_only}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Build desktop app (dev)
        run: |
          cd apps/desktop
          pnpm build:dev

  all-checks-passed:
    name: All Checks Passed
    needs: [desktop-tests, production-validation, build-check]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check if all jobs passed
        run: |
          if [ "${{ needs.desktop-tests.result }}" != "success" ] || \
             [ "${{ needs.production-validation.result }}" != "success" ] || \
             [ "${{ needs.build-check.result }}" != "success" ]; then
            echo "❌ Some checks failed"
            exit 1
          fi
          echo "✅ All checks passed"
