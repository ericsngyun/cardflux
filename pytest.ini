[pytest]
# CardFlux Pytest Configuration

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = scripts/identification/tests

# Output options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --cov=scripts/identification/core
    --cov-report=term-missing
    --cov-report=html:test-results/coverage
    --timeout=300

# Markers for organizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, requires artifacts)
    performance: Performance/benchmark tests
    slow: Slow tests (> 5 seconds)
    fast_v2: Tests specific to Fast Identifier v2
    production_v1: Tests specific to Production Identifier v1
    requires_gpu: Tests that require GPU
    requires_artifacts: Tests that need FAISS/embeddings/keypoints

# Ignore patterns
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg
    node_modules
    archive
    experiments

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options
[coverage:run]
source = scripts/identification/core
omit =
    */tests/*
    */archive/*
    */experiments/*
    */tools/*

[coverage:report]
precision = 2
skip_empty = true
sort = cover
